apiVersion: apps/v1
kind: Deployment
metadata:
  name: getpixii
  namespace: getpixii
  labels:
    app: getpixii
spec:
  replicas: 1
  selector:
    matchLabels:
      app: getpixii
  template:
    metadata:
      labels:
        app: getpixii
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: getpixii
          image: ghcr.io/sbjerome/getpixii:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: getpixii-db
                  key: DATABASE_URL
            - name: BIND
              value: "0.0.0.0:8080"
            - name: STATIC_DIR
              value: "/app/dist"
            - name: RUST_LOG
              value: "info,sqlx=warn"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 500m
              memory: 256Mi
